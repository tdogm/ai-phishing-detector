name: Build desktop apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, such as v1.0.0
        required: true
        default: v1.0.0
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/desktop-release.yml"
      - "app.py"
      - "desktop_launcher.py"
      - "desktop.spec"
      - "phishing_model.keras"
      - "requirements.txt"
      - "scaler.pkl"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
            artifact: AI-Phishing-Detector-macOS
          - os: windows-latest
            label: Windows
            artifact: AI-Phishing-Detector-Windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller && pip install -r requirements.txt

      - name: Build desktop application
        run: pyinstaller --noconfirm --clean desktop.spec

      - name: Package macOS application
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/AI Phishing Detector.app" "${{ matrix.artifact }}.zip"

      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/AI Phishing Detector" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-{0}', github.run_number) }}
          name: AI Phishing Detector ${{ github.event_name == 'workflow_dispatch' && inputs.version || startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-{0}', github.run_number) }}
          generate_release_notes: true
          files: release-assets/*.zip
